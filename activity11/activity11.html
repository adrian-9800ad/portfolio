<!DOCTYPE html>
<html>
    <head>
        <title>Activity 11</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>
    <body>
        <div class="loop-row">
            <div class="loop-card">
                <h2>For Loop</h2>
                <table id="forTable">
                    <tr>
                        <td><label for="forNumberInput">Enter number:</label></td>
                        <td><input id="forNumberInput" type="number" placeholder="Enter number"></td>
                    </tr>
                    <tr>
                        <td><label for="forTextInput">Enter text:</label></td>
                        <td><input id="forTextInput" type="text" placeholder="Enter text"></td>
                    </tr>
                    <tr>
                        <td><button type="button" id="forShowBtn">Show</button></td>
                        <td><button type="button" id="forClearBtn">Clear</button></td>
                    </tr>
                </table>
                <div id="forOutput" class="output"></div>
            </div>
            <div class="loop-card">
                <h2>While Loop</h2>
                <table id="whileTable">
                    <tr>
                        <td><label for="whileNumberInput">Enter number:</label></td>
                        <td><input id="whileNumberInput" type="number" placeholder="Enter number"></td>
                    </tr>
                    <tr>
                        <td><label for="whileTextInput">Enter text:</label></td>
                        <td><input id="whileTextInput" type="text" placeholder="Enter text"></td>
                    </tr>
                    <tr>
                        <td><button type="button" id="whileShowBtn">Show</button></td>
                        <td><button type="button" id="whileClearBtn">Clear</button></td>
                    </tr>
                </table>
                <div id="whileOutput" class="output"></div>
            </div>
            <div class="loop-card">
                <h2>Do-while Loop</h2>
                <table id="doTable">
                    <tr>
                        <td><label for="doNumberInput">Enter number:</label></td>
                        <td><input id="doNumberInput" type="number" placeholder="Enter number"></td>
                    </tr>
                    <tr>
                        <td><label for="doTextInput">Enter text:</label></td>
                        <td><input id="doTextInput" type="text" placeholder="Enter text"></td>
                    </tr>
                    <tr>
                        <td><button type="button" id="doShowBtn">Show</button></td>
                        <td><button type="button" id="doClearBtn">Clear</button></td>
                    </tr>
                </table>
                <div id="doOutput" class="output"></div>
            </div>
        </div>
    </body>
</html>
