<!DOCTYPE html>
<html>
<head>
    <title>Activity 4</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2f57, #1e4d8f);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.95);
            width: 550px;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .form-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(to right, gold, #f5c542);
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }

        h2 {
            text-align: center;
            color: #0f2f57;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td {
            padding: 10px 5px;
            vertical-align: top;
        }

        label {
            font-weight: 600;
            color: #0f2f57;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            transition: 0.3s;
            font-size: 14px;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            border-color: gold;
            outline: none;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.6);
        }

        .options-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .options-group label {
            font-weight: normal;
            margin-right: 10px;
        }

        input[type="radio"],
        input[type="checkbox"] {
            margin-right: 5px;
            accent-color: #0f2f57;
        }

        .buttons {
            text-align: center;
            padding-top: 15px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin: 8px;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        button[type="submit"] {
            background: linear-gradient(to right, #0f2f57, #1e4d8f);
            color: white;
        }

        button[type="submit"]:hover {
            background: linear-gradient(to right, gold, #f5c542);
            color: black;
            transform: translateY(-2px);
        }

        button[type="reset"] {
            background: #f5c542;
            color: black;
        }

        button[type="reset"]:hover {
            background: #0f2f57;
            color: white;
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .form-container {
                width: 90%;
            }

            table, tr, td {
                display: block;
                width: 100%;
            }

            td {
                padding: 8px 0;
            }
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h2>User Information Form</h2>

        <form action="" method="post">
            <table>

                <tr>
                    <td><label for="fname">First Name:</label></td>
                    <td><input type="text" id="fname" name="fname" required></td>
                </tr>

                <tr>
                    <td><label for="lname">Last Name:</label></td>
                    <td><input type="text" id="lname" name="lname" required></td>
                </tr>

                <tr>
                    <td><label for="age">Age:</label></td>
                    <td><input type="number" id="age" name="age"></td>
                </tr>

                <tr>
                    <td>Gender:</td>
                    <td class="options-group">
                        <label><input type="radio" name="gender" value="male"> Male</label>
                        <label><input type="radio" name="gender" value="female"> Female</label>
                        <label><input type="radio" name="gender" value="other"> Other</label>
                    </td>
                </tr>

                <tr>
                    <td>Hobbies:</td>
                    <td class="options-group">
                        <label><input type="checkbox" name="hobby[]" value="reading"> Reading</label>
                        <label><input type="checkbox" name="hobby[]" value="traveling"> Traveling</label>
                        <label><input type="checkbox" name="hobby[]" value="gaming"> Gaming</label>
                        <label><input type="checkbox" name="hobby[]" value="cooking"> Cooking</label>
                        <label><input type="checkbox" name="hobby[]" value="sports"> Sports</label>
                    </td>
                </tr>

                <tr>
                    <td><label for="year-level">Year Level:</label></td>
                    <td>
                        <select id="year-level" name="year-level">
                            <option value="1st-year">1st Year</option>
                            <option value="2nd-year">2nd Year</option>
                            <option value="3rd-year">3rd Year</option>
                            <option value="4th-year">4th Year</option>
                            <option value="5th-year">5th Year</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td colspan="2" class="buttons">
                        <button type="submit">Submit</button>
                        <button type="reset">Clear</button>
                    </td>
                </tr>

            </table>
        </form>
    </div>

</body>
</html>
